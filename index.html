<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SportZone — Home</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <script>
    // Protect page
    const loggedInUser = localStorage.getItem("loggedInUser");

    if (!loggedInUser) {
      window.location.href = "login.html";
    }
  </script>

  <!-- NAVBAR -->
  <nav class="bg-white shadow-md px-6 py-4 flex items-center justify-between">

    <h1 class="text-2xl font-bold text-blue-600">
      Sports Zone
    </h1>

    <div class="flex items-center gap-6">

      <a href="index.html" class="text-gray-700 hover:text-blue-600">
        Home
      </a>

      <a href="#" class="text-gray-700 hover:text-blue-600">
        Products
      </a>

      <a href="#" class="text-gray-700 hover:text-blue-600">
        Cart
      </a>

      <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
        Logout
      </button>

    </div>
  </nav>

  <!-- HERO -->
  <section class="bg-blue-600 text-white py-20 px-6 text-center">

    <h1 class="text-5xl font-bold mb-4">
      Welcome to Sports Zone
    </h1>

  </section>

  <script>

    // Logout
    function logout() {

      localStorage.removeItem("loggedInUser");

      window.location.href = "login.html";
    }

  </script>

</body>

</html>
