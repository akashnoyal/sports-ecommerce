<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <script>
        // Protect page
        const loggedInUser = localStorage.getItem("loggedInUser");

        if (!loggedInUser) {
            window.location.href = "login.html";
        }
    </script>

    <section class="min-h-screen flex items-center justify-center px-4 py-10">

        <div class="w-full max-w-4xl bg-white rounded-xl shadow-lg p-8">

            <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">
                Checkout
            </h1>

            <p class="text-center text-gray-500 mb-8">
                Complete your order details
            </p>

            <form class="grid grid-cols-1 md:grid-cols-2 gap-5" onsubmit="handleCheckout(event)">

                <!-- Full Name -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Full Name
                    </label>

                    <input type="text" id="name" placeholder="Enter your full name"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Email -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Email
                    </label>

                    <input type="email" id="email" placeholder="Enter your email"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Phone -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Phone Number
                    </label>

                    <input type="tel" id="phone" placeholder="Enter your phone number"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- City -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        City
                    </label>

                    <input type="text" id="city" placeholder="Enter your city"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Pincode -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Pincode
                    </label>

                    <input type="text" id="pincode" placeholder="Enter pincode"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Payment -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Payment Method
                    </label>

                    <select id="payment"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Select Payment</option>
                        <option value="UPI">UPI</option>
                        <option value="Card">Card</option>
                        <option value="Cash on Delivery">Cash on Delivery</option>
                    </select>
                </div>

                <!-- Address -->
                <div class="md:col-span-2">
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Address
                    </label>

                    <textarea id="address" rows="4" placeholder="Enter your address"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <!-- Button -->
                <button type="submit"
                    class="md:col-span-2 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg">
                    Place Order
                </button>

            </form>
        </div>
    </section>

    <script>
        function handleCheckout(e) {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const city = document.getElementById("city").value.trim();
            const pincode = document.getElementById("pincode").value.trim();
            const address = document.getElementById("address").value.trim();
            const payment = document.getElementById("payment").value;

            // Empty fields check
            if (
                !name ||
                !email ||
                !phone ||
                !city ||
                !pincode ||
                !address ||
                !payment
            ) {
                alert("Please fill all fields");
                return;
            }

            // Phone validation
            if (phone.length !== 10) {
                alert("Phone number must be 10 digits");
                return;
            }

            // Pincode validation
            if (pincode.length !== 6) {
                alert("Pincode must be 6 digits");
                return;
            }

            // Order object
            const order = {
                name,
                email,
                phone,
                city,
                pincode,
                address,
                payment
            };

            // Save order
            localStorage.setItem("order", JSON.stringify(order));

            // Clear cart
            localStorage.removeItem("cart");

            alert("Order Placed Successfully");

            // Redirect
            window.location.href = "index.html";
        }
    </script>

</body>

</html>
