<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Ecommerce Register</title>
</head>

<body class="bg-gray-100">

    <section class="min-h-screen flex items-center justify-center px-4">

        <div class="w-full max-w-md bg-white shadow-lg rounded-xl p-8">

            <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">
                Create Account
            </h1>

            <p class="text-center text-gray-500 mb-6">
                Register to start shopping
            </p>

            <form class="space-y-5" onsubmit="handleRegister(event)">

                <!-- Full Name -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Full Name
                    </label>

                    <input type="text" id="name" placeholder="Enter your full name"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Email -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Email Address
                    </label>

                    <input type="email" id="email" placeholder="Enter your email"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Password -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Password
                    </label>

                    <input type="password" id="password" placeholder="Create password"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Confirm Password
                    </label>

                    <input type="password" id="confirmPassword" placeholder="Confirm password"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Terms -->
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="terms">

                    <label for="terms" class="text-sm text-gray-600">
                        I agree to the terms and conditions
                    </label>
                </div>

                <!-- Register Button -->
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-300">
                    Register
                </button>

                <!-- Login Link -->
                <p class="text-center text-sm text-gray-600">
                    Already have an account?

                    <a href="/login.html" class="text-blue-600 font-medium hover:underline">
                        Login
                    </a>
                </p>

            </form>
        </div>
    </section>

    <script>
        function handleRegister(e) {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const terms = document.getElementById("terms").checked;

            // Get users array from localStorage
            const users = JSON.parse(localStorage.getItem("users")) || [];

            // Check existing email
            const existingUser = users.find((user) => user.email === email);

            if (existingUser) {
                alert("Email already registered");
                return;
            }

            // Empty fields check
            if (!name || !email || !password || !confirmPassword) {
                alert("Please fill all fields");
                return;
            }

            // Password length check
            if (password.length <= 6) {
                alert("Password must be more than 6 characters");
                return;
            }

            // Confirm password check
            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            // Terms checkbox check
            if (!terms) {
                alert("Please accept the terms and conditions");
                return;
            }

            // Create user object
            const user = {
                name,
                email,
                password
            };

            // Push new user
            users.push(user);

            // Store updated array
            localStorage.setItem("users", JSON.stringify(users));

            alert("Registration Successful");

            // Redirect
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
